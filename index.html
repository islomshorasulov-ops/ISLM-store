    color:var(--ink);

    min-height:100vh;
    padding-bottom:96px;
  }
  @font-face{
    font-family:'Fraunces';
    src:local('Georgia');
  }

  /* ---------- Header ---------- */
  .topbar{
    padding:22px 18px 14px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    background:rgba(10,10,10,0.35);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  .brand{
    font-family:'Fraunces', Georgia, serif;
    font-size:26px;
    letter-spacing:0.5px;
    font-weight:600;
    color:var(--paper);
  }
  .brand span{color:var(--brass);}
  .tagline{
    font-size:11px;
    color:var(--ink-dim);
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-top:2px;
  }

  /* ---------- Category tabs (tag-style) ---------- */
  .tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:16px 18px 4px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    position:relative;
    flex:0 0 auto;
    padding:9px 16px 9px 22px;
    border-radius:3px;
    background:var(--bg-elevated);
    color:var(--ink-dim);
    font-size:13px;
    font-weight:600;
    border:1px solid var(--line);
    white-space:nowrap;
    cursor:pointer;
    transition:all .2s ease;
  }
  .tab::before{
    content:'';
    position:absolute;
    left:9px; top:50%;
    width:5px; height:5px;
    border-radius:50%;
    background:var(--ink-dim);
    transform:translateY(-50%);
  }
  .tab{position:relative; overflow:visible;}
  .tab.active{
    background:var(--brass);
    color:#0A0A0A;
    border-color:var(--brass);
  }
  .tab.active::before{background:#0A0A0A;}
  .tab.disabled{opacity:.4;}

  /* ---------- Section label ---------- */
  .section-label{
    padding:20px 18px 10px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .section-label h2{
    font-family:'Fraunces', Georgia, serif;
    font-size:19px;
    font-weight:600;
    margin:0;
  }
  .section-label .count{
    font-size:12px;
    color:var(--ink-dim);
    border:1px solid var(--line);
    border-radius:20px;
    padding:2px 9px;
  }

  /* ---------- Empty state ---------- */
  .empty{
    margin:10px 18px 0;
    padding:36px 20px;
    text-align:center;
    border:1px dashed var(--line);
    border-radius:8px;
    color:var(--ink-dim);
    font-size:13px;
  }
  .empty b{display:block; color:var(--paper); font-size:15px; margin-bottom:4px; font-weight:600;}

  /* ---------- Product grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:0 18px 18px;
  }
  .card{
    background:rgba(20,20,20,0.72);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition:transform .15s ease, border-color .3s ease;
    opacity:0;
    transform:translateY(22px);
  }
  .card.visible{
    opacity:1;
    transform:translateY(0);
    transition:opacity .55s cubic-bezier(.16,1,.3,1), transform .55s cubic-bezier(.16,1,.3,1), border-color .3s ease;
  }
  .card:active{transform:scale(0.97);}
  .card:hover{border-color:#3d3d3d;}
  .card-media{
    aspect-ratio:1/1;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08), transparent 60%),
      #1A1A1A;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .card-media::after{
    content:'';
    position:absolute;
    top:0; left:-150%;
    width:80%; height:100%;
    background:linear-gradient(75deg, transparent, rgba(255,255,255,0.06), transparent);
    transition:left .6s ease;
  }
  .card:active .card-media::after{left:150%;}
  .card-media svg{width:64%; height:64%; position:relative; z-index:1;}
  .badge{
    position:absolute;
    top:8px; left:8px;
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.18);
    color:#EDEDED;
    padding:3px 7px;
    border-radius:3px;
    font-weight:700;
    z-index:1;
    backdrop-filter:blur(2px);
  }
  .card-body{
    padding:10px 11px 12px;
    display:flex;
    flex-direction:column;
    gap:4px;
    flex:1;
  }
  .card-name{
    font-size:13.5px;
    font-weight:700;
    color:var(--paper);
    line-height:1.25;
  }
  .card-desc{
    font-size:11.5px;
    color:var(--ink-dim);
    line-height:1.35;
    flex:1;
  }
  .card-price{
    font-family:'Fraunces', Georgia, serif;
    font-size:15px;
    color:var(--brass);
    font-weight:600;
    margin-top:2px;
  }
  .card-price small{
    font-family:'Manrope', sans-serif;
    font-size:10px;
    color:var(--ink-dim);
    font-weight:600;
  }
  .buy-btn{
    margin-top:8px;
    width:100%;
    padding:9px 0;
    border:none;
    border-radius:6px;
    background:var(--brass);
    color:#1B1A17;
    font-size:12.5px;
    font-weight:700;
    letter-spacing:0.3px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .buy-btn:active{background:var(--brass-dim);}
  .buy-btn.in-cart{
    background:transparent;
    color:#F2F2F2;
    border:1px solid #F2F2F2;
  }

  /* ---------- Sticky cart bar ---------- */
  .cart-bar{
    position:fixed;
    left:0; right:0; bottom:0;
    padding:12px 18px calc(14px + env(safe-area-inset-bottom));
    background:rgba(15,15,15,0.85);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    transform:translateY(100%);
    transition:transform .25s ease;
    z-index:50;
  }
  .cart-bar.visible{transform:translateY(0);}
  .cart-info{font-size:12.5px; color:var(--ink-dim);}
  .cart-info b{color:var(--paper); font-size:14px;}
  .checkout-btn{
    padding:11px 22px;
    border:none;
    border-radius:6px;
    background:var(--brass);
    color:#1B1A17;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;
    top:16px; left:50%;
    transform:translateX(-50%) translateY(-40px);
    background:#F2F2F2;
    color:#0A0A0A;
    padding:10px 18px;
    border-radius:8px;
    font-size:12.5px;
    font-weight:600;
    opacity:0;
    transition:all .25s ease;
    z-index:100;
    white-space:nowrap;
  }
  .toast.show{
    transform:translateX(-50%) translateY(0);
    opacity:1;
  }

  .footnote{
    padding:18px;
    text-align:center;
    font-size:10.5px;
    color:var(--ink-dim);
    letter-spacing:0.3px;
  }
</style>
</head>

// ---------- State ----------
let activeCategory = 'shoes';
const cart = {}; // id -> {product, qty}

// ---------- Telegram init ----------
const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.ready(); tg.expand(); }

// ---------- Render tabs ----------
function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = CATEGORIES.map(c => `
    <div class="tab ${c.id===activeCategory?'active':''} ${!c.ready?'disabled':''}" data-id="${c.id}">
      ${c.name}
    </div>
  `).join('');
  el.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      const cat = CATEGORIES.find(c=>c.id===t.dataset.id);
      if(!cat.ready){
        showToast('Раздел «'+cat.name+'» скоро появится');
        return;
      }
      activeCategory = cat.id;
      renderTabs();
      renderContent();
    });
  });
}

// ---------- Render content ----------
function fmt(n){ return n.toLocaleString('ru-RU') + ' сум'; }

function renderContent(){
  const el = document.getElementById('content');
  const cat = CATEGORIES.find(c=>c.id===activeCategory);
  const items = PRODUCTS[activeCategory] || [];

  if(items.length===0){
    el.innerHTML = `
      <div class="section-label"><h2>${cat.name}</h2></div>
      <div class="empty"><b>Раздел в разработке</b>Товары появятся здесь совсем скоро</div>
    `;
    return;
  }

  el.innerHTML = `
    <div class="section-label">
      <h2>${cat.name}</h2>
      <div class="count">${items.length}</div>
    </div>
    <div class="grid">
      ${items.map(p=>`
        <div class="card">
          <div class="card-media">
            <span class="badge">${p.badge}</span>
            ${p.image ? `<img src="${p.image}" alt="${p.name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;position:relative;z-index:1;">` : shoeIcon(p.variant)}
          </div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.desc}</div>
            <div class="card-price">${fmt(p.price)}</div>
            <button class="buy-btn ${cart[p.id]?'in-cart':''}" data-id="${p.id}">
              ${cart[p.id]?'В корзине ✓':'Купить'}
            </button>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  observeCards();

  el.querySelectorAll('.buy-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      const product = items.find(p=>p.id===id);
      if(cart[id]){
        delete cart[id];
        btn.classList.remove('in-cart');
        btn.textContent = 'Купить';
        showToast(product.name+' убран из корзины');
      } else {
        cart[id] = {product, qty:1};
        btn.classList.add('in-cart');
        btn.textContent = 'В корзине ✓';
        showToast(product.name+' добавлен в корзину');
        if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      }
      updateCartBar();
    });
  });
}

// ---------- Scroll reveal ----------
function observeCards(){
  const cards = document.querySelectorAll('.card');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        io.unobserve(entry.target);
      }
    });
  }, {threshold:0.15, rootMargin:'0px 0px -40px 0px'});
  cards.forEach((card, i)=>{
    card.style.transitionDelay = (i%2 * 0.06) + (Math.floor(i/2) * 0.08) + 's';
    io.observe(card);
  });
}

// ---------- Cart bar ----------
function updateCartBar(){
  const bar = document.getElementById('cartBar');
  const entries = Object.values(cart);
  const count = entries.reduce((s,e)=>s+e.qty,0);
  const sum = entries.reduce((s,e)=>s+e.product.price*e.qty,0);
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartSum').textContent = fmt(sum);
  bar.classList.toggle('visible', count>0);
}

document.getElementById('checkoutBtn').addEventListener('click', ()=>{
  const entries = Object.values(cart);
  if(entries.length===0) return;
  const lines = entries.map(e=>`${e.product.name} — ${fmt(e.product.price)}`);
  const total = entries.reduce((s,e)=>s+e.product.price*e.qty,0);
  const order = {
    type:'new_order',
    items: entries.map(e=>({id:e.product.id, name:e.product.name, price:e.product.price})),
    total
  };

  if(tg && tg.sendData){
    tg.sendData(JSON.stringify(order));
  } else {
    showToast('Демо-режим: заказ на '+fmt(total)+' (откройте через бота, чтобы отправить)');
  }
});

// ---------- Toast ----------
let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 1800);
}

// ---------- Init ----------
renderTabs();
renderContent();
updateCartBar();
</script>
